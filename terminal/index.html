<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shell Commands — willbentedev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --ink: #1a1916;
      --muted: #9e9b94;
      --accent: #c84b2f;
      --rule: #e0ddd8;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 0 clamp(1.5rem, 6vw, 5rem);
    }

    /* ── MAIN ── */
    main {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: clamp(4rem, 12vh, 8rem) 0 2rem;
      max-width: 780px;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      animation: rise 0.6s ease forwards 0.1s;
    }

    .eyebrow a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .eyebrow a:hover { color: var(--accent); }

    .eyebrow .sep { color: var(--rule); }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.75rem;
      opacity: 0;
      animation: rise 0.7s ease forwards 0.25s;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .bio {
      font-size: 0.88rem;
      line-height: 1.85;
      color: var(--muted);
      max-width: 52ch;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: rise 0.7s ease forwards 0.4s;
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: rise 0.6s ease forwards 0.5s;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* ── TABLE ── */
    .table-wrap {
      border: 1px solid var(--rule);
      border-radius: 3px;
      overflow: hidden;
      opacity: 0;
      animation: rise 0.7s ease forwards 0.62s;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: #f0ede8;
      border-bottom: 1px solid var(--rule);
    }

    thead th {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
      padding: 0.85rem 1.25rem;
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid var(--rule);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f0ede8; }

    tbody td {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      vertical-align: top;
    }

    .cmd-cell {
      white-space: nowrap;
    }

    .cmd-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      background: #eceae5;
      padding: 0.3rem 0.65rem;
      border-radius: 2px;
      border: 1px solid var(--rule);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
    }

    .cmd-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #f7f5f2;
    }

    .cmd-link svg {
      opacity: 0.45;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .cmd-link:hover svg { opacity: 1; }

    .desc-cell {
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.8rem;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink);
      color: var(--bg);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.6rem 1.2rem;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── FOOTER ── */
    footer {
      padding: 2rem 0 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--rule);
      margin-top: 5rem;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: rise 0.6s ease forwards 0.85s;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--accent); }

    /* ── ANIMATION ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .desc-cell { display: none; }
      thead th:last-child { display: none; }
    }
  </style>
</head>
<body>

  <main>
    <p class="eyebrow">
      <a href="/">Project</a>
      <span class="sep">/</span>
      Shell Commands
    </p>

    <h1>Shell Commands,<br /><em>terminal.</em></h1>

    <p class="bio">
      The commands I created andd use daily to speed up my terminal usage
    </p>

    <p class="section-title">Commands</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Command</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody id="cmd-table">
          <!-- Rows injected by JS below — edit the `commands` array -->
        </tbody>
      </table>
    </div>
  </main>

  <footer>
    <span>willbentedev</span>
    <span><a href="https://github.com/willbentedev" target="_blank" rel="noopener">github.com/willbentedev</a></span>
  </footer>

  <div id="toast">Copied to clipboard</div>

  <script>
    const GITHUB = "https://github.com/willbentedev";

    const commands = [
      {
        cmd: "sf",
        desc: "(search for) searches command history for a match of inputted text. No more pressing up arrow 20 times!",
        repo: ""
      },
      {
        cmd: "fs",
        desc: "(forgot sudo) if you forget sudo, this command is a game changer. just type fs and run your pervious command as sudo",
        repo: ""
      }
    ];

    // ─────────────────────────────────────────────
    const tbody = document.getElementById('cmd-table');

    commands.forEach(({ cmd, desc, repo }) => {
      const href = repo ? `${GITHUB}/${repo}` : GITHUB;
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td class="cmd-cell">
          <a class="cmd-link" href="${href}" target="_blank" rel="noopener" title="View in repo">
            ${escHtml(cmd)}
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 10L10 1M10 1H4M10 1V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </td>
        <td class="desc-cell">${escHtml(desc)}</td>
      `;

      // Right-click / long-press to copy
      tr.querySelector('.cmd-link').addEventListener('contextmenu', e => {
        e.preventDefault();
        navigator.clipboard.writeText(cmd).then(() => showToast());
      });

      tbody.appendChild(tr);
    });

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Toast
    const toast = document.getElementById('toast');
    let toastTimer;
    function showToast() {
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }
  </script>
</body>
</html>
