<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works Cited — Tux News — willbentedev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --ink: #1a1916;
      --muted: #9e9b94;
      --accent: #c84b2f;
      --rule: #e0ddd8;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(1.25rem, 4vw, 2.5rem) clamp(1.25rem, 5vw, 4rem) 0;
    }

    /* ── TOP BAR ── */
    .bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.25rem;
      margin-bottom: 1.25rem;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-right: auto;
    }

    .eyebrow a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .eyebrow a:hover { color: var(--accent); }
    .eyebrow .sep { color: var(--rule); }

    .page-nav { display: flex; flex-wrap: wrap; gap: 0.6rem; }

    .page-nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      padding: 0.55rem 1rem;
      border: 1px solid var(--rule);
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .page-nav a:hover { border-color: var(--accent); color: var(--accent); }

    .page-nav a.primary {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    .page-nav a.primary:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }

    /* ── PDF VIEWER ── */
    .viewer {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--rule);
      border-radius: 3px;
      overflow: hidden;
      background: #fff;
      margin-bottom: clamp(1.25rem, 4vw, 2.5rem);
    }

    .viewer object,
    .viewer iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .fallback {
      padding: 2rem;
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--muted);
      text-align: center;
    }

    .fallback a { color: var(--accent); text-decoration: none; }
    .fallback a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="bar">
    <p class="eyebrow">
      <a href="/">Home</a>
      <span class="sep">/</span>
      <a href="/article/">Article</a>
      <span class="sep">/</span>
      Sources
    </p>
    <nav class="page-nav">
      <a class="primary" href="/article/">&larr; Read the article</a>
      <a href="/">Back home</a>
    </nav>
  </div>

  <div class="viewer">
    <object data="works-cited.pdf#view=FitH" type="application/pdf">
      <iframe src="works-cited.pdf#view=FitH" title="Works Cited — Tux News">
        <p class="fallback">
          Your browser can't display the PDF inline.
          <a href="works-cited.pdf">Download &ldquo;Works Cited&rdquo; (PDF)</a>.
        </p>
      </iframe>
    </object>
  </div>

</body>
</html>
